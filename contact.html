<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Satriyo A.P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script>
      tailwind.config = { darkMode: "class" };
    </script>
  </head>
  <body
    class="bg-[#ededed] dark:bg-[#00090f] min-h-screen font-sans antialiased text-slate-700 dark:text-zinc-400"
  >
    <div
      id="scroll-anchor"
      class="absolute top-0 h-4 w-full pointer-events-none"
    ></div>

    <div class="fixed top-0 left-0 w-full z-50 px-4">
      <header
        id="nav-header"
        class="max-w-4xl mx-auto my-4 px-4 py-3 flex justify-between items-center w-full transition-all duration-300 border-b border-transparent"
      >
        <div class="logo-img">
          <a href="index.html">
            <img src="img/logo.png" alt="" class="dark:hidden" />
            <img src="img/logo-dark.png" alt="" class="hidden dark:block" />
          </a>
        </div>

        <div class="flex items-center gap-5">
          <nav
            class="flex items-center gap-5 text-xs font-medium text-slate-600 dark:text-zinc-300"
          >
            <a
              href="about.html"
              class="hover:text-slate-900 dark:hover:text-white"
              >About</a
            >
            <a
              href="projects.html"
              class="hover:text-slate-900 dark:hover:text-white"
              >Projects</a
            >
            <a
              href="contact.html"
              class="hover:text-slate-900 dark:hover:text-white text-slate-900 dark:text-white"
              >Contact</a
            >
          </nav>

          <div id="extra-controls" class="flex items-center gap-3">
            <button
              id="theme-toggle"
              class="w-7 h-7 flex items-center justify-center rounded border border-slate-300 dark:border-zinc-800 text-slate-500 dark:text-zinc-400 hover:bg-slate-200/50 dark:hover:bg-zinc-900/50 transition-colors"
              aria-label="Toggle Theme"
            >
              <i
                id="theme-toggle-light-icon"
                class="fa-solid fa-sun text-xs hidden dark:block"
              ></i>
              <i
                id="theme-toggle-dark-icon"
                class="fa-solid fa-moon text-xs block dark:hidden"
              ></i>
            </button>
          </div>
        </div>
      </header>
    </div>

    <main class="max-w-4xl mx-auto px-8 pb-24 pt-32">
      <div class="mb-8">
        <a
          href="index.html"
          class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-medium rounded border border-slate-300 dark:border-zinc-800 text-slate-500 dark:text-zinc-400 hover:bg-slate-100 dark:hover:bg-zinc-900/50 transition-colors"
        >
          &lt; Back
        </a>
      </div>

      <section class="space-y-6">
        <h1 class="text-3xl font-bold text-slate-900 dark:text-zinc-100">
          Contact
        </h1>

        <p
          class="text-sm text-slate-600 dark:text-zinc-400 max-w-2xl leading-relaxed"
        >
          For questions and inquiries regarding website, design, and requests,
          please contact me using the following form:
        </p>

        <form
          action="#"
          method="POST"
          class="w-full bg-white dark:bg-[#090f16]/30 border border-slate-200 dark:border-zinc-900 rounded-xl p-6 md:p-8 space-y-5 shadow-sm"
        >
          <div class="space-y-2">
            <label
              for="name"
              class="block text-xs font-semibold text-slate-700 dark:text-zinc-300 tracking-wide"
            >
              Name
            </label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="John Doe"
              class="w-full text-sm px-4 py-2.5 rounded-lg border border-slate-200 dark:border-zinc-800 bg-slate-50 dark:bg-[#1a232d]/40 text-slate-900 dark:text-zinc-100 placeholder-slate-400 dark:placeholder-zinc-600 focus:outline-none focus:border-slate-400 dark:focus:border-zinc-700 transition-colors"
              required
            />
          </div>

          <div class="space-y-2">
            <label
              for="email"
              class="block text-xs font-semibold text-slate-700 dark:text-zinc-300 tracking-wide"
            >
              E-Mail address
            </label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="johndoe@example.com"
              class="w-full text-sm px-4 py-2.5 rounded-lg border border-slate-200 dark:border-zinc-800 bg-slate-50 dark:bg-[#1a232d]/40 text-slate-900 dark:text-zinc-100 placeholder-slate-400 dark:placeholder-zinc-600 focus:outline-none focus:border-slate-400 dark:focus:border-zinc-700 transition-colors"
              required
            />
          </div>

          <div class="space-y-2">
            <label
              for="reason"
              class="block text-xs font-semibold text-slate-700 dark:text-zinc-300 tracking-wide"
            >
              Reason
            </label>
            <div class="relative">
              <select
                id="reason"
                name="reason"
                class="w-full text-sm pl-10 pr-4 py-2.5 rounded-lg border border-slate-200 dark:border-zinc-800 bg-slate-50 dark:bg-[#1a232d]/40 text-slate-900 dark:text-zinc-100 focus:outline-none focus:border-slate-400 dark:focus:border-zinc-700 transition-colors appearance-none cursor-pointer"
              >
                <option value="" disabled selected>---</option>
                <option value="collaboration">Collaboration Project</option>
                <option value="inquiry">General Inquiry</option>
                <option value="other">Other Request</option>
              </select>
              <div
                class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none text-slate-400 dark:text-zinc-600 text-xs"
              >
                <i class="fa-solid fa-question"></i>
              </div>
              <div
                class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-slate-400 dark:text-zinc-600 text-xs"
              >
                <i class="fa-solid fa-chevron-down"></i>
              </div>
            </div>
          </div>

          <div class="space-y-2">
            <label
              for="message"
              class="block text-xs font-semibold text-slate-700 dark:text-zinc-300 tracking-wide"
            >
              Message
            </label>
            <textarea
              id="message"
              name="message"
              rows="6"
              placeholder="Messages here..."
              class="w-full text-sm px-4 py-3 rounded-lg border border-slate-200 dark:border-zinc-800 bg-slate-50 dark:bg-[#1a232d]/40 text-slate-900 dark:text-zinc-100 placeholder-slate-400 dark:placeholder-zinc-600 focus:outline-none focus:border-slate-400 dark:focus:border-zinc-700 transition-colors resize-y min-h-[120px]"
              required
            ></textarea>
          </div>

          <div class="pt-2">
            <button
              type="submit"
              class="inline-flex items-center justify-center px-5 py-2 text-xs font-medium rounded-lg border border-slate-300 dark:border-zinc-800 bg-slate-100 hover:bg-slate-200 text-slate-700 dark:text-zinc-300 dark:bg-zinc-900/60 dark:hover:bg-zinc-900 transition-all duration-200 shadow-sm active:scale-[0.98]"
            >
              Send
            </button>
          </div>
        </form>
      </section>
    </main>

    <footer
      class="max-w-4xl mx-auto px-8 py-6 border-t border-slate-200 dark:border-zinc-900 flex flex-col sm:flex-row justify-between items-center gap-4 text-xs text-slate-400 dark:text-zinc-600"
    >
      <div>©2026 satriyo-burner.github.io. All rights reserved.</div>
      <div class="flex items-center gap-5 text-sm">
        <a
          href="https://github.com/satriyo-burner"
          aria-label="GitHub"
          class="hover:text-slate-800 dark:hover:text-white transition-colors"
        >
          <i class="fa-brands fa-github"></i>
        </a>
        <a
          href="mailto:satriyo.p25118@satamail.my.id"
          aria-label="Email"
          class="hover:text-slate-800 dark:hover:text-white transition-colors"
        >
          <i class="fa-solid fa-envelope"></i>
        </a>
        <a
          href="https://x.com/mayo9262"
          aria-label="Twitter"
          class="hover:text-slate-800 dark:hover:text-white transition-colors"
        >
          <i class="fa-brands fa-x-twitter"></i>
        </a>
      </div>
    </footer>

    <script>
      const themeToggleBtn = document.getElementById("theme-toggle");
      const html = document.documentElement;

      if (
        localStorage.getItem("theme") === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        html.classList.add("dark");
      } else {
        html.classList.remove("dark");
      }

      themeToggleBtn.addEventListener("click", () => {
        html.classList.toggle("dark");
        localStorage.setItem(
          "theme",
          html.classList.contains("dark") ? "dark" : "light",
        );
      });

      const navHeader = document.getElementById("nav-header");
      const extraControls = document.getElementById("extra-controls");
      const scrollAnchor = document.getElementById("scroll-anchor");

      const navObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (!entry.isIntersecting) {
              navHeader.classList.add(
                "max-w-2xl",
                "py-2",
                "px-5",
                "bg-white/80",
                "dark:bg-[#0c131a]/90",
                "backdrop-blur-md",
                "border-slate-200",
                "dark:border-zinc-900",
                "rounded-full",
                "shadow-md",
              );
              extraControls.classList.add(
                "pl-3",
                "border-l",
                "border-slate-200",
                "dark:border-zinc-900",
              );
            } else {
              navHeader.classList.remove(
                "max-w-xl",
                "py-2",
                "px-5",
                "bg-white/80",
                "dark:bg-[#0c131a]/90",
                "backdrop-blur-md",
                "border-slate-200",
                "dark:border-zinc-900",
                "rounded-full",
                "shadow-md",
              );
              extraControls.classList.remove(
                "pl-3",
                "border-l",
                "border-slate-200",
                "dark:border-zinc-900",
              );
            }
          });
        },
        { threshold: 0 },
      );

      navObserver.observe(scrollAnchor);
    </script>
  </body>
</html>
